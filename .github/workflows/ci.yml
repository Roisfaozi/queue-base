name: CI (Integration & Quality)

on:
  push:
    branches: ["**"] # Run on all branches
    tags: ["v*"] # Run on version tags
    paths:
      - "internal/**"
      - "pkg/**"
      - "cmd/**"
      - "go.mod"
      - "go.sum"
      - "Makefile"
      - "deploy/**"
      - "docker-compose*.yml"
      - ".github/workflows/ci.yml"
      - ".github/workflows/cd-staging.yml"
      - ".github/workflows/cd-production.yml"
  pull_request:
    branches: ["**"] # Run on all PRs
    paths:
      - "internal/**"
      - "pkg/**"
      - "cmd/**"
      - "go.mod"
      - "go.sum"
      - "Makefile"
      - "deploy/**"
      - "docker-compose*.yml"
      - ".github/workflows/ci.yml"
      - ".github/workflows/cd-staging.yml"
      - ".github/workflows/cd-production.yml"

jobs:
  lint:
    name: Lint & Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25.5"
          cache: true

      - name: Run Linter
        uses: golangci/golangci-lint-action@v9.2.0
        with:
          version: latest
          args: --timeout=5m --fix

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25.5"
          cache: true

      - name: Install dependencies
        run: go mod download

      - name: Run Unit Tests with Coverage
        run: make test-coverage

      - name: Upload Unit Coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-unit
          path: coverage_unit.html
        if: always()

  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25.5"
          cache: true

      - name: Install dependencies
        run: go mod download

      - name: Run Integration Tests
        run: make test-integration
        env:
          DOCKER_HOST: unix:///var/run/docker.sock

  test-e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25.5"
          cache: true

      - name: Install dependencies
        run: go mod download

      - name: Run E2E Tests
        run: make test-e2e
        env:
          DOCKER_HOST: unix:///var/run/docker.sock

  benchmark:
    name: Benchmarks
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25.5"
          cache: true

      - name: Install dependencies
        run: go mod download

      - name: Run Benchmarks
        run: make bench

  build-check:
    name: Build & Compilation Check
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25.5"
          cache: true

      - name: Dry Run Build
        run: go build -v -o /dev/null ./cmd/api/main.go
