name: Frontend CD

on:
  workflow_run:
    workflows: ["Frontend CI"]
    types:
      - completed
    branches:
      - staging
      - main

env:
  CI: true
  NEXT_TELEMETRY_DISABLED: 1

jobs:
  package-web:
    name: Package Web Build
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.8.0

      - name: Setup Node
        uses: actions/setup-node@v6.3
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web app
        run: pnpm --filter casbin-web build

      - name: Upload web build artifact
        uses: actions/upload-artifact@v6
        with:
          name: web-build-${{ github.event.workflow_run.head_branch }}
          path: |
            apps/web/.next
            apps/web/public/sw.js

  package-client:
    name: Package Client Build
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.8.0

      - name: Setup Node
        uses: actions/setup-node@v6.3
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build client app
        run: pnpm --filter casbin-client build

      - name: Upload client build artifact
        uses: actions/upload-artifact@v6
        with:
          name: client-build-${{ github.event.workflow_run.head_branch }}
          path: apps/client/build
