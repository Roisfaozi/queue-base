# Lefthook configuration for Go Clean Boilerplate Monorepo
# https://github.com/evilmartians/lefthook

pre-commit:
  parallel: true
  commands:
    # ─── GO BACKEND ───
    go-fmt:
      glob: '**/*.go'
      run: gofmt -w {staged_files} && git add {staged_files}

    go-vet:
      glob: '**/*.go'
      run: go vet ./...

    go-lint:
      glob: '**/*.go'
      run: golangci-lint run

    # ─── FRONTEND & UI ───
    format:
      glob: '**/*.{js,ts,jsx,tsx,json,css}'
      run: pnpm exec biome format --write {staged_files} && git add {staged_files}

    # ─── VALIDATION ───
    typecheck:
      glob: '**/*.{js,ts,jsx,tsx,json,css}'
      run: pnpm turbo run typecheck

    # Temporarily disabled lint in pre-commit due to existing baseline errors
    lint:
      glob: '**/*.{js,ts,jsx,tsx,json,css}'
      run: pnpm lint
